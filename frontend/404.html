<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Monitor Not Found | Statrix</title>
    <link rel="icon" type="image/png" href="/static/images/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/images/logo.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/public.css">
    <link rel="stylesheet" href="/static/css/delight.css">
    <style>
        body {
            overflow-x: hidden;
        }

        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .astronaut-container {
            position: relative;
            margin-bottom: 40px;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
            }
            25% {
                transform: translateY(-20px) rotate(2deg);
            }
            50% {
                transform: translateY(-10px) rotate(-1deg);
            }
            75% {
                transform: translateY(-25px) rotate(1deg);
            }
        }

        .astronaut-image {
            width: 300px;
            height: 300px;
            object-fit: contain;
            filter: drop-shadow(0 20px 60px rgba(0, 212, 170, 0.4));
            transition: filter 0.3s;
        }

        .astronaut-image:hover {
            filter: drop-shadow(0 30px 80px rgba(0, 212, 170, 0.6));
        }

        .astronaut-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(0, 212, 170, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: glowPulse 4s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes glowPulse {
            0%, 100% {
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        .content {
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title {
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #ffffff 0%, #44b6ae 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 20px rgba(68, 182, 174, 0.25));
        }

        .subtitle {
            font-size: 18px;
            color: #889097;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .message {
            font-size: 16px;
            color: #889097;
            margin-bottom: 40px;
            max-width: 500px;
            line-height: 1.7;
        }

        .buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #44b6ae 0%, #369a93 100%);
            color: #fff;
            box-shadow: 0 4px 16px rgba(68, 182, 174, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(68, 182, 174, 0.6);
        }

        .footer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #889097;
            font-size: 12px;
            z-index: 2;
        }

        .footer a {
            color: #44b6ae;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 900px) {
            .container {
                padding: 30px 15px;
            }

            .astronaut-image {
                width: 250px;
                height: 250px;
            }

            .astronaut-glow {
                width: 280px;
                height: 280px;
            }

            .title {
                font-size: 28px;
            }

            .subtitle {
                font-size: 16px;
            }

            .message {
                font-size: 14px;
            }

            .buttons {
                flex-direction: column;
                align-items: center;
                gap: 12px;
            }

            .btn {
                width: 100%;
                max-width: 300px;
                justify-content: center;
            }
        }

        @media (max-width: 700px) {
            .container {
                padding: 20px 12px;
            }

            .astronaut-container {
                margin-bottom: 30px;
            }

            .astronaut-image {
                width: 200px;
                height: 200px;
            }

            .astronaut-glow {
                width: 230px;
                height: 230px;
            }

            .title {
                font-size: 24px;
                margin-bottom: 12px;
            }

            .subtitle {
                font-size: 15px;
                margin-bottom: 20px;
            }

            .message {
                font-size: 13px;
                margin-bottom: 30px;
            }

            .btn {
                padding: 12px 24px;
                font-size: 14px;
            }
        }

        @media (max-width: 500px) {
            .container {
                padding: 15px 10px;
            }

            .astronaut-image {
                width: 180px;
                height: 180px;
            }

            .astronaut-glow {
                width: 200px;
                height: 200px;
            }

            .title {
                font-size: 20px;
            }

            .subtitle {
                font-size: 14px;
            }

            .message {
                font-size: 12px;
            }

            .buttons {
                gap: 10px;
            }

            .btn {
                padding: 10px 20px;
                font-size: 13px;
            }

            .footer {
                font-size: 11px;
                padding: 0 10px;
            }
        }
    </style>
</head>

<body>

    <div class="starfield" id="starfield"></div>

    <div class="container">

        <div class="astronaut-container">
            <div class="astronaut-glow"></div>
            <img src="/static/images/404.png" alt="404 - Astronaut" class="astronaut-image" width="300" height="300">
        </div>

        <div class="content" id="content">
            <h1 class="title" id="title">Page Not Found</h1>
            <p class="subtitle" id="subtitle">The page you're looking for doesn't exist</p>
            <p class="message" id="message">
                The page you are trying to access may have been moved, deleted, or never existed.
                Please check the URL and try again.
            </p>

            <div class="buttons">
                <a href="/" class="btn btn-primary">
                    <i class="fas fa-home"></i>
                    Back to Status Page
                </a>
            </div>
        </div>
    </div>

    <div class="footer">
        Powered by <a href="https://github.com/irisXDR/Statrix" target="_blank" rel="noopener noreferrer">Statrix</a> - Uptime Monitor
    </div>

    <script>
        function createStars() {
            const starfield = document.getElementById('starfield');
            const fragment = document.createDocumentFragment();
            const starCount = 100;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.cssText = `left:${Math.random() * 100}%;top:${Math.random() * 100}%;width:${size}px;height:${size}px;animation-delay:${Math.random() * 3}s;animation-duration:${Math.random() * 2 + 2}s`;
                fragment.appendChild(star);
            }
            starfield.appendChild(fragment);
        }

        function set404Message() {
            const urlParams = new URLSearchParams(window.location.search);
            const reason = urlParams.get('reason');

            const titleEl = document.getElementById('title');
            const subtitleEl = document.getElementById('subtitle');
            const messageEl = document.getElementById('message');

            if (reason === 'maintenance') {
                titleEl.textContent = 'Monitor Report Not Available';
                subtitleEl.textContent = 'This monitor is under maintenance';
                messageEl.textContent = 'The detailed report for this monitor is temporarily unavailable while it is in maintenance mode. Please check back later.';
            } else if (reason === 'private') {
                titleEl.textContent = 'Monitor Report Not Available';
                subtitleEl.textContent = 'This monitor\'s report is set to private';
                messageEl.textContent = 'The detailed report for this monitor has been set to private by the administrator. Only public monitors can be viewed on this status page.';
            } else if (reason === 'unavailable') {
                titleEl.textContent = 'Monitor Report Unavailable';
                subtitleEl.textContent = 'The report is private, missing, or not yet synced';
                messageEl.textContent = 'This monitor report cannot be loaded right now. It may be private, deleted, or still propagating. Please refresh and try again shortly.';
            } else {
                titleEl.textContent = 'Page Not Found';
                subtitleEl.textContent = 'The page you\'re looking for doesn\'t exist';
                messageEl.textContent = 'The page you are trying to access may have been moved, deleted, or never existed. Please check the URL and try again.';
            }
        }

        createStars();
        set404Message();

        const astronaut = document.querySelector('.astronaut-container');
        if (astronaut) {
            if (window.matchMedia('(min-width: 769px)').matches) {
                document.addEventListener('mousemove', (e) => {
                    const moveX = (e.clientX / window.innerWidth - 0.5) * 20;
                    const moveY = (e.clientY / window.innerHeight - 0.5) * 20;
                    astronaut.style.transform = `translate(${moveX}px, ${moveY}px)`;
                }, { passive: true });
            }

            if (window.DeviceOrientationEvent && window.matchMedia('(max-width: 768px)').matches) {
                window.addEventListener('deviceorientation', (e) => {
                    if (e.beta !== null && e.gamma !== null) {
                        astronaut.style.transform = `translate(${(e.gamma || 0) / 5}px, ${(e.beta || 0) / 5}px)`;
                    }
                }, { passive: true });
            }
        }
    </script>
</body>

</html>
